<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowMind AI — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { background:#0d0d12; font-family:'Inter',sans-serif; }
    .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#8b5cf6); transition:all .25s; box-shadow:0 4px 20px rgba(99,102,241,.35); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(99,102,241,.5); }
    input:focus { outline:none; border-color:rgba(99,102,241,.7); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
    .gradient-text { background:linear-gradient(135deg,#818cf8,#c084fc,#fb923c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <!-- Ambient glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-indigo-600 rounded-full opacity-10 blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-purple-600 rounded-full opacity-10 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md">

    <!-- Card -->
    <div class="glass rounded-3xl p-8 md:p-10">

      <!-- Logo -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg flex-shrink-0">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold gradient-text">FlowMind AI</h1>
          <p class="text-xs text-gray-500">AI Diagram Generator</p>
        </div>
      </div>

      <h2 class="text-2xl font-bold text-white mb-1">Welcome back 👋</h2>
      <p class="text-gray-400 text-sm mb-8">Enter your mobile number to receive a login OTP.</p>

      <!-- Messages -->
      {% for message in messages %}
      <div class="mb-4 px-4 py-3 rounded-xl text-sm
        {% if message.tags == 'error' %}bg-red-500/10 border border-red-500/20 text-red-400
        {% else %}bg-emerald-500/10 border border-emerald-500/20 text-emerald-400{% endif %}">
        {{ message }}
      </div>
      {% endfor %}

      <!-- Form -->
      <form method="post" class="flex flex-col gap-5">
        {% csrf_token %}

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Mobile Number</label>
          <div class="flex items-center gap-2 bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 transition-all duration-200 focus-within:border-indigo-500/70 focus-within:shadow-[0_0_0_3px_rgba(99,102,241,0.15)]">
            <span class="text-gray-500 text-sm font-medium select-none">+91</span>
            <div class="w-px h-5 bg-white/10"></div>
            <input
              id="phone"
              name="phone"
              type="tel"
              maxlength="10"
              placeholder="98XXXXXXXX"
              required
              autofocus
              class="flex-1 bg-transparent text-white placeholder-gray-600 text-sm focus:outline-none"
            />
          </div>
        </div>

        <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-white flex items-center justify-center gap-2 text-sm">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          Send OTP
        </button>
      </form>

      <p class="text-center text-xs text-gray-700 mt-6">
        OTP will be printed in the server console during testing.
      </p>
    </div>

    <p class="text-center text-xs text-gray-700 mt-5">Powered by Gemini 2.5 Flash · Mermaid.js v10</p>
  </div>
</body>
</html>
