<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowMind AI — Verify OTP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { background:#0d0d12; font-family:'Inter',sans-serif; }
    .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#8b5cf6); transition:all .25s; box-shadow:0 4px 20px rgba(99,102,241,.35); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(99,102,241,.5); }
    .otp-input { letter-spacing:0.5em; text-align:center; font-size:1.5rem; font-weight:700; }
    .gradient-text { background:linear-gradient(135deg,#818cf8,#c084fc,#fb923c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <!-- Ambient glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/3 left-1/3 w-80 h-80 bg-violet-600 rounded-full opacity-10 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md">
    <div class="glass rounded-3xl p-8 md:p-10">

      <!-- Logo -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg flex-shrink-0">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold gradient-text">FlowMind AI</h1>
          <p class="text-xs text-gray-500">Secure Login</p>
        </div>
      </div>

      <!-- OTP sent badge -->
      <div class="mb-6 flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-500/10 border border-indigo-500/20">
        <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <p class="text-indigo-300 text-sm font-medium">OTP sent to +91 {{ phone }}</p>
          <p class="text-gray-500 text-xs">Check the server console/terminal for the OTP</p>
        </div>
      </div>

      <h2 class="text-2xl font-bold text-white mb-1">Verify OTP</h2>
      <p class="text-gray-400 text-sm mb-8">Enter the 4-digit code displayed in your server terminal.</p>

      <!-- Messages -->
      {% for message in messages %}
      <div class="mb-4 px-4 py-3 rounded-xl text-sm leading-relaxed
        {% if message.tags == 'error' %}bg-red-500/10 border border-red-500/20 text-red-400
        {% else %}bg-emerald-500/10 border border-emerald-500/20 text-emerald-300{% endif %}">
        {{ message|safe }}
      </div>
      {% endfor %}


      <!-- OTP Form -->
      <form method="post" class="flex flex-col gap-6">
        {% csrf_token %}

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest">4-Digit OTP</label>
          <input
            id="otp"
            name="otp"
            type="text"
            maxlength="4"
            pattern="\d{4}"
            placeholder="••••"
            required
            autofocus
            class="otp-input bg-white/[0.04] border border-white/10 rounded-xl px-4 py-4 text-white placeholder-gray-700 transition-all duration-200 focus:outline-none focus:border-indigo-500/70 focus:shadow-[0_0_0_3px_rgba(99,102,241,0.15)] w-full"
          />
        </div>

        <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-white flex items-center justify-center gap-2 text-sm">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Verify & Sign In
        </button>
      </form>

      <!-- Resend link -->
      <div class="mt-6 text-center">
        <a href="{% url 'send_otp' %}" class="text-sm text-indigo-400 hover:text-indigo-300 transition-colors">
          ← Use a different number / Resend OTP
        </a>
      </div>
    </div>
  </div>
</body>
</html>
